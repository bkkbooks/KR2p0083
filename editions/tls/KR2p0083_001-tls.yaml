body:
  text: 靈王既位申息不慭寧王敗蔡靈侯於呂命申人室實出取蔡之器執事人夾蔡人之軍門命人毋敢徒空出申成公識其子虛未蓄髮命之遣虛三徒出執事人止之虛乘一輚駟告執事人小人幼不能以施器得此車或不能御之以歸命以其策歸執事人許之虛秉策以歸至擊澨又棄其策焉成公懼其又取焉而諄逆之諒爲之怒舉邦盡獲汝獨亡得虛不答又爲之怒
